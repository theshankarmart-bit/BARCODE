<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Stock Lookup & Audit</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@zxing/library@0.19.1/umd/index.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f1117;
    color: #f0f0f0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 0 40px 0;
  }

  header {
    width: 100%;
    background: #1a1d27;
    border-bottom: 1px solid #2a2d3a;
    padding: 18px 20px 14px;
    text-align: center;
  }
  header h1 {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.3px;
    color: #fff;
  }
  header p {
    font-size: 12px;
    color: #7a7f9a;
    margin-top: 3px;
  }

  .container {
    width: 100%;
    max-width: 420px;
    padding: 20px 16px 0;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  /* Upload card */
  .upload-card {
    background: #1a1d27;
    border: 1.5px dashed #2f3347;
    border-radius: 14px;
    padding: 20px 16px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    position: relative;
  }
  .upload-card:hover, .upload-card.drag-over {
    border-color: #5b6af0;
    background: #1e2135;
  }
  .upload-card input[type="file"] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer;
  }
  .upload-icon {
    font-size: 32px;
    margin-bottom: 8px;
  }
  .upload-card h3 {
    font-size: 14px; font-weight: 600; color: #d0d4f0;
  }
  .upload-card p {
    font-size: 12px; color: #666b8a; margin-top: 4px;
  }
  .upload-card.loaded {
    border-style: solid;
    border-color: #2a5f3a;
    background: #141f1a;
  }
  .upload-card.loaded h3 { color: #5ccf7e; }

  /* Column mapper */
  #col-mapper {
    background: #1a1d27;
    border: 1px solid #2a2d3a;
    border-radius: 14px;
    padding: 16px;
    display: none;
    flex-direction: column;
    gap: 12px;
  }
  #col-mapper h3 {
    font-size: 13px; font-weight: 600; color: #a0a5c0; text-transform: uppercase; letter-spacing: 0.5px;
  }
  .field-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .field-row label {
    font-size: 13px; color: #8890b0; min-width: 80px; flex-shrink: 0;
  }
  select {
    flex: 1;
    background: #0f1117;
    border: 1px solid #2a2d3a;
    border-radius: 8px;
    color: #d0d4f0;
    font-size: 13px;
    padding: 7px 10px;
    outline: none;
    appearance: none;
    -webkit-appearance: none;
  }
  select:focus { border-color: #5b6af0; }

  .btn-confirm {
    background: #5b6af0;
    color: #fff;
    border: none;
    border-radius: 9px;
    padding: 10px 16px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
    transition: background 0.15s;
  }

  /* Scanner area */
  #scanner-section {
    display: none;
    flex-direction: column;
    gap: 14px;
  }

  .video-wrap {
    position: relative;
    border-radius: 16px;
    overflow: hidden;
    background: #000;
    aspect-ratio: 4/3;
    width: 100%;
  }
  video {
    width: 100%; height: 100%; object-fit: cover;
    display: block;
  }
  .scan-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }
  .scan-box {
    width: 260px; height: 130px;
    border: 2px solid #5b6af0;
    border-radius: 10px;
    box-shadow: 0 0 0 2000px rgba(0,0,0,0.55);
  }
  .scan-box::before {
    content: '';
    position: absolute;
    left: 0; right: 0;
    height: 2px;
    background: #5b6af0;
    box-shadow: 0 0 8px #5b6af0;
    animation: scan 2s linear infinite;
  }
  @keyframes scan {
    0% { top: 35%; } 50% { top: 65%; } 100% { top: 35%; }
  }

  .scan-hint {
    text-align: center;
    font-size: 12px;
    color: #7a7f9a;
  }

  .control-row {
    display: flex;
    gap: 8px;
  }
  .btn-action {
    background: #1a1d27;
    color: #d0d4f0;
    border: 1px solid #2a2d3a;
    border-radius: 9px;
    padding: 10px 12px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
  }
  .btn-action.stop { background: #2a1020; color: #e05c6a; border-color: #4a2030; }
  .btn-export {
    background: #142f22;
    color: #5ccf7e;
    border: 1px solid #1e4a30;
    width: 100%;
    border-radius: 9px;
    padding: 12px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    text-align: center;
  }

  /* Manual input */
  .manual-row {
    display: flex; gap: 8px;
  }
  .manual-row input {
    flex: 1;
    background: #1a1d27;
    border: 1px solid #2a2d3a;
    border-radius: 9px;
    color: #d0d4f0;
    font-size: 14px;
    padding: 10px 12px;
    outline: none;
  }
  .manual-row input:focus { border-color: #5b6af0; }
  .btn-search {
    background: #5b6af0;
    color: #fff;
    border: none;
    border-radius: 9px;
    padding: 10px 14px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }

  /* Result Card & Audit Form */
  #result-card {
    display: none;
    background: #1a1d27;
    border-radius: 14px;
    border: 1px solid #2a2d3a;
    overflow: hidden;
  }
  .result-header {
    padding: 12px 16px;
    background: #141626;
    border-bottom: 1px solid #2a2d3a;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .result-header span { font-size: 11px; font-weight: 600; text-transform: uppercase; color: #666b8a; }
  .result-barcode { font-size: 13px; color: #5b6af0; font-family: monospace; }
  .result-body { padding: 16px; }
  
  .stock-comparison-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 14px;
  }
  .stock-box-panel {
    background: #10121a;
    border: 1px solid #222533;
    border-radius: 10px;
    padding: 12px;
    text-align: center;
  }
  .stock-box-panel .title { font-size: 11px; color: #666b8a; text-transform: uppercase; margin-bottom: 4px; }
  .stock-box-panel .num { font-size: 24px; font-weight: 700; color: #fff; }
  
  .audit-input-row {
    background: #141f1a;
    border: 1px solid #1e3828;
    border-radius: 10px;
    padding: 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 14px;
  }
  .audit-input-row.discrepancy-active {
    background: #2b1b10;
    border-color: #543118;
  }
  .audit-input-row label { font-size: 13px; font-weight: 600; color: #5ccf7e; }
  .audit-input-row.discrepancy-active label { color: #f0a850; }
  .audit-input-row input {
    width: 90px;
    background: #0f1117;
    border: 1px solid #2a2d3a;
    border-radius: 6px;
    padding: 6px 8px;
    color: #fff;
    font-size: 16px;
    font-weight: 600;
    text-align: center;
    outline: none;
  }
  
  .result-row {
    display: flex; justify-content: space-between;
    align-items: baseline;
    padding: 6px 0;
    border-bottom: 1px solid #1e2030;
    font-size: 13px;
  }
  .result-row .lbl { color: #666b8a; }
  .result-row .val { color: #d0d4f0; text-align: right; max-width: 60%; word-break: break-word; }

  /* Not found */
  #not-found {
    display: none;
    background: #1f1218;
    border: 1px solid #4a2030;
    border-radius: 14px;
    padding: 20px 16px;
    text-align: center;
  }
  #not-found h3 { font-size: 14px; color: #e05c6a; }
  #not-found p { font-size: 12px; color: #7a3040; margin-top: 4px; }

  #status-bar {
    background: #1a1d27;
    border: 1px solid #2a2d3a;
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 12px;
    color: #8890b0;
    text-align: center;
    display: none;
  }
  .divider-or { text-align: center; font-size: 11px; color: #444860; display: flex; align-items: center; gap: 10px; }
  .divider-or::before, .divider-or::after { content: ''; flex: 1; height: 1px; background: #2a2d3a; }
</style>
</head>
<body>

<header>
  <h1>📦 Stock Lookup & Audit</h1>
  <p>Track quantities and save discrepancies on your phone</p>
</header>

<div class="container">

  <div class="upload-card" id="upload-card">
    <input type="file" id="excel-file" accept=".xlsx,.xls,.csv" />
    <div class="upload-icon">📊</div>
    <h3 id="upload-title">Upload Vyapar Export Excel</h3>
    <p id="upload-sub">Tap to load your master stock list</p>
  </div>

  <div id="col-mapper">
    <h3>Map your columns</h3>
    <div class="field-row">
      <label>Barcode col</label>
      <select id="sel-barcode"></select>
    </div>
    <div class="field-row">
      <label>Quantity col</label>
      <select id="sel-qty"></select>
    </div>
    <div class="field-row">
      <label>Name col <span style="color:#444860">(opt)</span></label>
      <select id="sel-name"></select>
    </div>
    <button class="btn-confirm" onclick="confirmMapping()">✓ Confirm & Start Audit</button>
  </div>

  <div id="scanner-section">
    <div id="status-bar"></div>

    <div class="video-wrap" id="video-wrap">
      <video id="video" playsinline muted></video>
      <div class="scan-overlay"><div class="scan-box"></div></div>
    </div>
    
    <div class="control-row">
      <button class="btn-action stop" id="btn-stop" onclick="stopCamera()">⏹ Stop Cam</button>
      <button class="btn-action" id="btn-zoom" onclick="toggleZoom()">🔍 Zoom (1x)</button>
      <button class="btn-action" onclick="toggleTorch()">🔦 Torch</button>
    </div>

    <button class="btn-export" id="btn-download" onclick="exportDiscrepancies()">📥 Export Discrepancy File (<span id="audit-count">0</span>)</button>

    <div class="divider-or">or type last 5-6 digits</div>

    <div class="manual-row">
      <input type="text" id="manual-input" placeholder="Type numbers..." inputmode="numeric" />
      <button class="btn-search" onclick="searchManual()">Search</button>
    </div>

    <div id="result-card">
      <div class="result-header">
        <span>Scanned Item</span>
        <span class="result-barcode" id="res-barcode"></span>
      </div>
      <div class="result-body">
        
        <div class="stock-comparison-grid">
          <div class="stock-box-panel">
            <div class="title">System Stock</div>
            <div class="num" id="system-qty-val">—</div>
          </div>
          <div class="stock-box-panel" style="background: #141824;">
            <div class="title" style="color: #5b6af0;">Current Status</div>
            <div class="num" id="counted-qty-status" style="color: #5ccf7e;">Match</div>
          </div>
        </div>

        <div class="audit-input-row" id="audit-input-panel">
          <label id="audit-label">Counted Qty:</label>
          <input type="number" id="physical-qty-input" step="any" oninput="updateAuditValue()" placeholder="Qty" />
        </div>

        <div class="result-row" id="res-name-row">
          <span class="lbl">Product</span>
          <span class="val" id="res-name">—</span>
        </div>
        <div id="extra-rows"></div>
      </div>
    </div>

    <div id="not-found">
      <h3>Barcode not found</h3>
      <p id="nf-code"></p>
    </div>
  </div>

</div>

<script>
let sheetData = [];
let headers = [];
let barcodeCol = '', qtyCol = '', nameCol = '';
let codeReader = null;
let scanning = false;
let lastScanned = '';
let scanCooldown = false;
let currentZoom = 1;
let currentActiveItemCode = null;

// Audit records stored cleanly by item key code
let auditDiscrepancies = {};

let barcodeMap = new Map();
let suffix5Map = new Map();
let suffix6Map = new Map();

// Load any session data from local storage if existing
if(localStorage.getItem('vyapar_audit_store')) {
  try {
    auditDiscrepancies = JSON.parse(localStorage.getItem('vyapar_audit_store'));
    updateAuditCountBadge();
  } catch(e) {}
}

// ── Upload ──────────────────────────────────────────────────────────────────
document.getElementById('excel-file').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const wb = XLSX.read(ev.target.result, { type: 'binary' });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const json = XLSX.utils.sheet_to_json(ws, { defval: '' });
      if (!json.length) { alert('Sheet appears empty.'); return; }
      sheetData = json;
      headers = Object.keys(json[0]);
      populateSelectors();
      document.getElementById('upload-title').textContent = '✅ ' + file.name;
      document.getElementById('upload-sub').textContent = json.length + ' rows loaded';
      document.getElementById('upload-card').classList.add('loaded');
      document.getElementById('col-mapper').style.display = 'flex';
    } catch(err) { alert('Could not read file: ' + err.message); }
  };
  reader.readAsBinaryString(file);
});

function populateSelectors() {
  ['sel-barcode','sel-qty','sel-name'].forEach(id => {
    const sel = document.getElementById(id);
    sel.innerHTML = (id === 'sel-name' ? '<option value="">— none —</option>' : '');
    headers.forEach(h => {
      const opt = document.createElement('option');
      opt.value = h; opt.textContent = h;
      sel.appendChild(opt);
    });
  });
  const lower = headers.map(h => h.toLowerCase());
  const barcodeGuess = lower.findIndex(h => /barcode|ean|upc|sku|code|id/i.test(h));
  const qtyGuess = lower.findIndex(h => /qty|quantity|stock|count|available|balance/i.test(h));
  const nameGuess = lower.findIndex(h => /name|product|description|item|title/i.test(h));
  if (barcodeGuess >= 0) document.getElementById('sel-barcode').selectedIndex = barcodeGuess;
  if (qtyGuess >= 0) document.getElementById('sel-qty').selectedIndex = qtyGuess;
  if (nameGuess >= 0) document.getElementById('sel-name').selectedIndex = nameGuess + 1;
}

function confirmMapping() {
  barcodeCol = document.getElementById('sel-barcode').value;
  qtyCol = document.getElementById('sel-qty').value;
  nameCol = document.getElementById('sel-name').value;
  if (!barcodeCol || !qtyCol) { alert('Please select barcode and quantity columns.'); return; }

  barcodeMap.clear();
  suffix5Map.clear();
  suffix6Map.clear();
  
  sheetData.forEach(row => {
    const rawCode = String(row[barcodeCol] || '').trim();
    if (!rawCode) return;
    barcodeMap.set(rawCode, row);
    if (rawCode.length >= 5) suffix5Map.set(rawCode.slice(-5), row);
    if (rawCode.length >= 6) suffix6Map.set(rawCode.slice(-6), row);
  });

  document.getElementById('col-mapper').style.display = 'none';
  document.getElementById('scanner-section').style.display = 'flex';
  startCamera();
}

// ── Camera Operations ───────────────────────────────────────────────────────
async function startCamera() {
  setStatus('Starting autofocus camera…');
  try {
    const constraints = {
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 }, frameRate: { ideal: 30 }, focusMode: { ideal: 'continuous' } }
    };
    const stream = await navigator.mediaDevices.getUserMedia(constraints);
    const video = document.getElementById('video');
    video.srcObject = stream;
    await video.play();

    const track = stream.getVideoTracks()[0];
    if (track && track.getCapabilities) {
      const caps = track.getCapabilities();
      const advancedConstraints = {};
      if (caps.focusMode && caps.focusMode.includes('continuous')) advancedConstraints.focusMode = 'continuous';
      if (caps.zoom && caps.zoom.max >= 2) { currentZoom = 2; advancedConstraints.zoom = currentZoom; document.getElementById('btn-zoom').textContent = `🔍 Zoom (${currentZoom}x)`; }
      if (Object.keys(advancedConstraints).length > 0) await track.applyConstraints({ advanced: [advancedConstraints] });
    }

    codeReader = new ZXing.BrowserMultiFormatReader();
    codeReader.timeBetweenDecodingAttempts = 60;
    codeReader.decodeFromStream(stream, video, (result, err) => {
      if (result && !scanCooldown) {
        const code = result.getText();
        if (code !== lastScanned) {
          lastScanned = code;
          handleBarcode(code); 
          scanSuccessFeedback();
          scanCooldown = true;
          setTimeout(() => { scanCooldown = false; }, 1000);
        }
      }
    });
    scanning = true;
    setStatus('📷 Camera focused. Align barcode in box.');
  } catch(err) { setStatus('Using manual search row.'); }
}

async function toggleZoom() {
  const video = document.getElementById('video');
  const track = video.srcObject?.getVideoTracks?.()[0];
  if (!track || !track.getCapabilities) return;
  const caps = track.getCapabilities();
  if (!caps.zoom) return;
  currentZoom = currentZoom === 1 ? Math.min(2, caps.zoom.max) : currentZoom === 2 ? Math.min(3, caps.zoom.max) : caps.zoom.min || 1;
  await track.applyConstraints({ advanced: [{ zoom: currentZoom }] });
  document.getElementById('btn-zoom').textContent = `🔍 Zoom (${currentZoom.toFixed(1)}x)`;
}

async function toggleTorch(){
  const video = document.getElementById('video');
  const track = video.srcObject?.getVideoTracks?.()[0];
  if(!track) return;
  const caps = track.getCapabilities?.();
  if(!caps || !caps.torch) return;
  window.__torchOn = !window.__torchOn;
  await track.applyConstraints({advanced:[{torch: window.__torchOn}]});
}

function stopCamera() {
  if (codeReader) { try { codeReader.reset(); } catch(e){} codeReader = null; }
  const video = document.getElementById('video');
  if (video.srcObject) { video.srcObject.getTracks().forEach(t => t.stop()); video.srcObject = null; }
  scanning = false;
  document.getElementById('video-wrap').style.display = 'none';
  document.getElementById('btn-stop').style.display = 'none';
  document.getElementById('btn-zoom').style.display = 'none';
  setStatus('Camera offline.');
}

function setStatus(msg) {
  const bar = document.getElementById('status-bar');
  bar.style.display = 'block'; bar.textContent = msg;
}

// ── Item Lookup & Audit Logic ───────────────────────────────────────────────
function searchManual() {
  const val = document.getElementById('manual-input').value.trim();
  if (!val) return;
  handleBarcode(val);
}

document.getElementById('manual-input').addEventListener('keydown', function(e) { if (e.key === 'Enter') searchManual(); });

function handleBarcode(code) {
  document.getElementById('result-card').style.display = 'none';
  document.getElementById('not-found').style.display = 'none';

  const codeStr = String(code).trim();
  let row = barcodeMap.get(codeStr);
  
  if (!row) {
    if (codeStr.length === 5) row = suffix5Map.get(codeStr);
    else if (codeStr.length === 6) row = suffix6Map.get(codeStr);
  }
  if (!row && codeStr.length >= 4) {
    row = sheetData.find(r => String(r[barcodeCol]).trim().endsWith(codeStr));
  }

  if (!row) {
    document.getElementById('not-found').style.display = 'block';
    document.getElementById('nf-code').textContent = 'Searched code: ' + codeStr;
    return;
  }

  currentActiveItemCode = String(row[barcodeCol]).trim();
  const originalQty = parseFloat(row[qtyCol]) || 0;
  
  document.getElementById('res-barcode').textContent = currentActiveItemCode;
  document.getElementById('system-qty-val').textContent = originalQty;

  if (nameCol && row[nameCol]) {
    document.getElementById('res-name').textContent = row[nameCol];
    document.getElementById('res-name-row').style.display = 'flex';
  } else {
    document.getElementById('res-name-row').style.display = 'none';
  }

  // Check if this barcode already has a saved audit adjustment in local storage
  const inputEl = document.getElementById('physical-qty-input');
  if (auditDiscrepancies[currentActiveItemCode] !== undefined) {
    inputEl.value = auditDiscrepancies[currentActiveItemCode].countedQty;
  } else {
    inputEl.value = originalQty; // Default to matching system stock
  }

  updateAuditValue(); // Refresh card colors and statuses

  // Build optional attribute list below input rows
  const extraDiv = document.getElementById('extra-rows');
  extraDiv.innerHTML = '';
  const skip = new Set([barcodeCol, qtyCol, nameCol]);
  Object.entries(row).forEach(([k, v]) => {
    if (skip.has(k) || v === '' || v === null || v === undefined) return;
    const div = document.createElement('div');
    div.className = 'result-row';
    div.innerHTML = `<span class="lbl">${k}</span><span class="val">${v}</span>`;
    extraDiv.appendChild(div);
  });

  document.getElementById('result-card').style.display = 'block';
  document.getElementById('result-card').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

// Fires instantly when you type into the physical stock input
function updateAuditValue() {
  if (!currentActiveItemCode) return;
  
  const systemQty = parseFloat(document.getElementById('system-qty-val').textContent) || 0;
  const typedVal = document.getElementById('physical-qty-input').value;
  
  const statusBadge = document.getElementById('counted-qty-status');
  const panel = document.getElementById('audit-input-panel');
  const label = document.getElementById('audit-label');

  if (typedVal === '' || parseFloat(typedVal) === systemQty) {
    // Quantities match: clear any custom tracking for this barcode
    delete auditDiscrepancies[currentActiveItemCode];
    
    statusBadge.textContent = "Match";
    statusBadge.style.color = "#5ccf7e";
    panel.className = "audit-input-row";
    label.textContent = "Counted Qty:";
    label.style.color = "#5ccf7e";
  } else {
    // Discrepancy detected: save the change to memory
    const counted = parseFloat(typedVal) || 0;
    const prodName = document.getElementById('res-name').textContent || 'Unknown Item';
    
    auditDiscrepancies[currentActiveItemCode] = {
      barcode: currentActiveItemCode,
      name: prodName,
      systemQty: systemQty,
      countedQty: counted,
      difference: counted - systemQty
    };

    statusBadge.textContent = "Mismatch";
    statusBadge.style.color = "#f0a850";
    panel.className = "audit-input-row discrepancy-active";
    label.textContent = "Changed Qty ⚠️";
    label.style.color = "#f0a850";
  }

  // Save progress locally to phone storage
  localStorage.setItem('vyapar_audit_store', JSON.stringify(auditDiscrepancies));
  updateAuditCountBadge();
}

function updateAuditCountBadge() {
  const count = Object.keys(auditDiscrepancies).length;
  document.getElementById('audit-count').textContent = count;
}

// ── Exporting Discrepancy File to Phone ─────────────────────────────────────
function exportDiscrepancies() {
  const records = Object.values(auditDiscrepancies);
  if (records.length === 0) {
    alert("No stock changes detected yet! Change 'Counted Qty' values on mismatched items first.");
    return;
  }

  // Standard CSV row creation line
  let csvContent = "data:text/csv;charset=utf-8,";
  csvContent += "Barcode/Item Code,Product Name,System Quantity,Physical Counted Quantity,Difference/Adjustment\n";

  records.forEach(r => {
    // Sanitize item names to prevent breaking CSV cells with commas
    const sanitizedName = r.name.replace(/,/g, " ");
    csvContent += `"${r.barcode}","${sanitizedName}",${r.systemQty},${r.countedQty},${r.difference}\n`;
  });

  // Create automated link download interaction for phone devices
  const encodedUri = encodeURI(csvContent);
  const downloadAnchor = document.createElement("a");
  
  // Format filename cleanly with the current local date stamp
  const today = new Date().toISOString().slice(0, 10);
  downloadAnchor.setAttribute("href", encodedUri);
  downloadAnchor.setAttribute("download", `Vyapar_Stock_Changes_${today}.csv`);
  
  document.body.appendChild(downloadAnchor);
  downloadAnchor.click();
  document.body.removeChild(downloadAnchor);
}

function scanSuccessFeedback(){
  try { navigator.vibrate && navigator.vibrate(80); } catch(e){}
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator(); const gain = ctx.createGain();
    osc.frequency.value = 900; osc.connect(gain); gain.connect(ctx.destination);
    osc.start(); gain.gain.setValueAtTime(0.05, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.08);
    osc.stop(ctx.currentTime + 0.08);
  } catch(e){}
}
</script>
